services:
  db:
    image: postgres:16-alpine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKeyTicketeraSOC}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:-masterKeyTicketeraSOC}
      ENABLE_METRICS: "True" # Activa Prometheus exporter
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    networks:
      - app-network
    depends_on:
      - db
      - redis
      - meilisearch
    command: gunicorn app.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300 --access-logfile -
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 10

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FASE 5: OBSERVABILIDAD ---
  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - app-network
    # ports:
    #   - "9090:9090" # Opcional: exponer solo si necesitas debuggear prometheus directo

  grafana:
    image: grafana/grafana:latest
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin # CAMBIAR EN PRIMER LOGIN
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3002:3000" # Grafana en puerto 3002 para no chocar con Frontend o servicios locales
    depends_on:
      - prometheus
    networks:
      - app-network

  soc-module:
    build:
      context: ./soc-module
      dockerfile: Dockerfile
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000/api/v1/integrations/fortisiem-incident
      - PYTHONUNBUFFERED=1
    ports:
      - "514:514/udp"
    networks:
      - app-network
    depends_on:
      - backend

  validator:
    container_name: validator
    build:
      context: .
      dockerfile: ./validator/Dockerfile
    env_file:
      - .env
    environment:
      - BASE_URL=https://nginx
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
      - redis
      - backend
      - frontend
      - nginx
    networks:
      - app-network


volumes:
  db_data:
  redis_data:
  uploads_data:
  meili_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge